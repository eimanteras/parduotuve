<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Kategorijos</title>
</h:head>
<h:body>
    <h1>Kategorijų sąrašas</h1>

    <h:dataTable value="#{parduotuveBean.visiKategorijos}" var="k" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{k.id}
        </h:column>
        <h:column>
            <f:facet name="header">Pavadinimas</f:facet>
            #{k.pavadinimas}
        </h:column>
    </h:dataTable>

    <hr/>
    <h2>Pridėti naują kategoriją</h2>
    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel value="Pavadinimas:"/>
            <h:inputText value="#{parduotuveBean.naujaKategorija.pavadinimas}"/>
        </h:panelGrid>
        <h:commandButton value="Išsaugoti" action="#{parduotuveBean.issaugotiKategorija}"/>
    </h:form>

    <hr/>
    <h:link value="Grįžti" outcome="index"/>
</h:body>
</html>
