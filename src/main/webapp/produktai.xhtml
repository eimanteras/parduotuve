<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Produktai</title>
</h:head>
<h:body>
    <h1>Produktų sąrašas (JPA)</h1>

    <h:dataTable value="#{parduotuveBean.visiProduktai}" var="p" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{p.id}
        </h:column>
        <h:column>
            <f:facet name="header">Pavadinimas</f:facet>
            #{p.pavadinimas}
        </h:column>
        <h:column>
            <f:facet name="header">Kaina</f:facet>
            #{p.kaina}
        </h:column>
        <h:column>
            <f:facet name="header">Kategorija</f:facet>
            #{p.kategorija.pavadinimas}
        </h:column>
        <h:column>
            <f:facet name="header">Sandėliai</f:facet>
            #{parduotuveBean.sandeliuTekstas(p)}
        </h:column>
    </h:dataTable>

    <hr/>
    <h2>Pridėti naują produktą</h2>
    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel value="Pavadinimas:"/>
            <h:inputText value="#{parduotuveBean.naujasProduktas.pavadinimas}"/>

            <h:outputLabel value="Kaina:"/>
            <h:inputText value="#{parduotuveBean.naujasProduktas.kaina}"/>

            <h:outputLabel value="Kategorija:"/>
            <h:selectOneMenu value="#{parduotuveBean.naujasProduktas.kategorija}">
                <f:converter converterId="kategorijaConverter"/>
                <f:selectItems value="#{parduotuveBean.visiKategorijos}"
                               var="k"
                               itemValue="#{k}"
                               itemLabel="#{k.pavadinimas}"/>
            </h:selectOneMenu>

            <h:outputLabel value="Sandėliai:"/>
            <h:selectManyCheckbox value="#{parduotuveBean.pasirinktiSandeliuIds}">
                <f:selectItems value="#{parduotuveBean.visiSandeliai}"
                               var="s"
                               itemValue="#{s.id}"
                               itemLabel="#{s.pavadinimas} (#{s.adresas})"/>
            </h:selectManyCheckbox>
        </h:panelGrid>
        <h:commandButton value="Išsaugoti" action="#{parduotuveBean.issaugotiProdukta}"/>
    </h:form>

    <hr/>
    <h:link value="Grįžti" outcome="index"/>
</h:body>
</html>
