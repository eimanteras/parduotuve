<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Produktai (MyBatis)</title>
</h:head>
<h:body>
    <h1>Produktų sąrašas (MyBatis)</h1>

    <h:dataTable value="#{parduotuveBean.myBatisProduktai}" var="p" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{p.id}
        </h:column>
        <h:column>
            <f:facet name="header">Pavadinimas</f:facet>
            #{p.pavadinimas}
        </h:column>
        <h:column>
            <f:facet name="header">Kaina</f:facet>
            #{p.kaina}
        </h:column>
        <h:column>
            <f:facet name="header">Kategorija</f:facet>
            #{p.kategorijaPavadinimas}
        </h:column>
    </h:dataTable>

    <hr/>
    <h:link value="Grįžti" outcome="index"/>
</h:body>
</html>
